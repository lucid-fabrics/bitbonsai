<div class="library-card" [class.disabled]="!library().enabled">
  <div class="card-header">
    <div class="header-left">
      <h3 class="library-name">
        <i class="fas fa-folder-open"></i>
        {{ library().name }}
      </h3>
      <span class="media-type-badge" [attr.data-type]="library().mediaType">
        <i class="fas" [ngClass]="getMediaTypeIcon(library().mediaType)"></i>
        {{ getMediaTypeLabel(library().mediaType) }}
      </span>
    </div>
    <div class="header-right">
      <span class="status-badge" [class.online]="library().node.status === 'ONLINE'">
        {{ library().node.name }}
      </span>
    </div>
  </div>

  <div class="card-body">
    <div class="library-path">
      <i class="fas fa-folder"></i>
      <span>{{ library().path }}</span>
    </div>

    <div class="stats-grid">
      <div class="stat-item">
        <i class="fas fa-file-video"></i>
        <div class="stat-content">
          <div class="stat-value">{{ library().totalFiles.toLocaleString() }}</div>
          <div class="stat-label">Files</div>
        </div>
      </div>

      <div class="stat-item">
        <i class="fas fa-database"></i>
        <div class="stat-content">
          <div class="stat-value">{{ formatSize(library().totalSizeBytes) }}</div>
          <div class="stat-label">Total Size</div>
        </div>
      </div>

      <div class="stat-item">
        <i class="fas fa-clock"></i>
        <div class="stat-content">
          <div class="stat-value">{{ formatDate(library().lastScanAt) }}</div>
          <div class="stat-label">Last Scan</div>
        </div>
      </div>

      <div class="stat-item">
        <i class="fas fa-tasks"></i>
        <div class="stat-content">
          <div class="stat-value">{{ library()._count.jobs }}</div>
          <div class="stat-label">Jobs</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card-footer">
    <button class="btn btn-icon" (click)="onEdit()" title="Edit library">
      <i class="fas fa-edit"></i>
      Edit
    </button>
    <button class="btn btn-icon" (click)="onScan()" title="Scan library">
      <i class="fas fa-sync-alt"></i>
      Scan
    </button>
    <button class="btn btn-icon btn-danger" (click)="onDelete()" title="Delete library">
      <i class="fas fa-trash"></i>
      Delete
    </button>
  </div>
</div>
