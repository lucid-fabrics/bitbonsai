@if (isOpen) {
  <div class="modal-overlay" (click)="close()">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <!-- Header -->
      <div class="modal-header">
        <div class="header-content">
          <div class="error-icon">
            <i class="fas fa-exclamation-circle"></i>
          </div>
          <div class="header-text">
            <h2>Encoding Failed</h2>
            <p class="subtitle">{{ fileName }}</p>
          </div>
        </div>
        <button class="close-btn" (click)="close()" aria-label="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <!-- Content -->
      <div class="modal-content">
        <!-- Error Summary Card -->
        <div class="error-summary-card">
          <div class="error-message">
            <i class="fas fa-info-circle"></i>
            <span>{{ getErrorSummary() }}</span>
          </div>
          <button class="action-btn copy-btn" (click)="copyToClipboard()" title="Copy error details">
            <i class="fas fa-copy"></i>
            <span>Copy Details</span>
          </button>
        </div>

        <!-- Collapsible Technical Details -->
        <div class="details-section">
          <button class="section-toggle" (click)="toggleTechnicalDetails()" [class.expanded]="showTechnicalDetails">
            <i class="fas" [class.fa-chevron-right]="!showTechnicalDetails" [class.fa-chevron-down]="showTechnicalDetails"></i>
            <span>Technical Details</span>
            <span class="toggle-hint">{{ showTechnicalDetails ? 'Hide' : 'Show' }}</span>
          </button>

          @if (showTechnicalDetails) {
            <div class="details-content">
              <div class="detail-row">
                <span class="detail-label">Job ID</span>
                <span class="detail-value">{{ jobId }}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value">
                  <span class="status-badge">{{ status }}</span>
                </span>
              </div>
              <div class="detail-row full-width">
                <span class="detail-label">Error Output</span>
                <div class="error-output">
                  <pre>{{ error || 'No error details available' }}</pre>
                </div>
              </div>
            </div>
          }
        </div>

        <!-- Contextual Help -->
        @if (hasContextualHelp()) {
          <div class="contextual-help">
            <div class="help-header">
              <i class="fas fa-lightbulb"></i>
              <span>Suggested Actions</span>
            </div>
            <div class="help-content">
              {{ getContextualHelp() }}
            </div>
          </div>
        }

        <!-- Quick Actions -->
        <div class="quick-actions">
          <button class="action-btn secondary" (click)="close()">
            <i class="fas fa-times"></i>
            Dismiss
          </button>
        </div>
      </div>
    </div>
  </div>
}
