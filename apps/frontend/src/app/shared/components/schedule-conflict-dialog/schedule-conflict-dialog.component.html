<div class="dialog-overlay" (click)="onBackdropClick($event)">
  <div class="dialog-content" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-icon warning">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h2 class="dialog-title">{{ 'scheduleConflict.title' | transloco }}</h2>
      <button class="dialog-close" (click)="onCancel()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="dialog-body">
      <div class="warning-message">
        <p><strong>{{ data.nodeName }}</strong> {{ 'scheduleConflict.outsideWindow' | transloco : { nodeName: '' } }}</p>
        <p class="conflict-details">{{ data.message }}</p>
      </div>

      <div class="info-box">
        <i class="fas fa-info-circle"></i>
        <div class="info-content">
          <p>{{ 'scheduleConflict.description' | transloco }}</p>
        </div>
      </div>
    </div>

    <div class="dialog-footer">
      <button class="btn btn-secondary" (click)="onCancel()">
        <i class="fas fa-times"></i>
        {{ 'common.cancel' | transloco }}
      </button>
      <button class="btn btn-warning" (click)="onConfirm()">
        <i class="fas fa-check"></i>
        {{ 'scheduleConflict.delegateAnyway' | transloco }}
      </button>
    </div>
  </div>
</div>
