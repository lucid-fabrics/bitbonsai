<div class="dialog-overlay" (click)="onBackdropClick($event)">
  <div class="dialog-content" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-icon warning">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h2 class="dialog-title">Schedule Conflict Warning</h2>
      <button class="dialog-close" (click)="onCancel()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="dialog-body">
      <div class="warning-message">
        <p><strong>{{ data.nodeName }}</strong> is currently outside its scheduled encoding window.</p>
        <p class="conflict-details">{{ data.message }}</p>
      </div>

      <div class="info-box">
        <i class="fas fa-info-circle"></i>
        <div class="info-content">
          <p>The job will be assigned to this node, but it may not start encoding until the node's schedule window begins.</p>
        </div>
      </div>
    </div>

    <div class="dialog-footer">
      <button class="btn btn-secondary" (click)="onCancel()">
        <i class="fas fa-times"></i>
        Cancel
      </button>
      <button class="btn btn-warning" (click)="onConfirm()">
        <i class="fas fa-check"></i>
        Delegate Anyway
      </button>
    </div>
  </div>
</div>
