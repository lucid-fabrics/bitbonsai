<div class="bell-container" [class.animate]="shouldAnimate" [attr.aria-label]="'nodes.pendingRequests' | transloco">
  <i class="fas fa-bell bell-icon" [class.has-notifications]="pendingCount > 0"></i>
  @if (pendingCount > 0) {
    <span class="badge" [class.pulse]="shouldAnimate">{{ pendingCount }}</span>
  }
</div>
