version: '3.8'

services:
  bitbonsai-backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend
    container_name: bitbonsai-backend
    ports:
      - "3002:3000"
      - "9230:9229"  # Node.js debug port
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:/data/bitbonsai.db
      - PORT=3000
      - MEDIA_PATHS=/media/sonarr,/media/radarr,/media/whisparr
      - LOG_LEVEL=debug
    volumes:
      # Source code with HMR
      - ./apps/backend:/app/apps/backend:cached
      - ./libs:/app/libs:cached
      - ./prisma:/app/prisma:cached
      # Real media directory from your *arr stack
      - /Volumes/Downloads/completed:/media:cached
      # Database persistence
      - bitbonsai-data:/data
      # Preserve node_modules (don't mount from host)
      - /app/node_modules
    command: npx nx serve backend --host 0.0.0.0
    restart: unless-stopped
    networks:
      - bitbonsai-network

  bitbonsai-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend
    container_name: bitbonsai-frontend
    ports:
      - "4201:4200"  # Local development - no port conflicts
    environment:
      - NODE_ENV=development
    volumes:
      # Source code with HMR
      - ./apps/frontend:/app/apps/frontend:cached
      - ./libs:/app/libs:cached
      - ./proxy.docker.conf.json:/app/proxy.conf.json:ro
      - ./angular.json:/app/angular.json:ro
      # Preserve node_modules (don't mount from host)
      - /app/node_modules
    command: npx nx serve frontend --host 0.0.0.0
    restart: unless-stopped
    networks:
      - bitbonsai-network

  # Optional: PostgreSQL for commercial tier (uncomment to enable)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: bitbonsai-postgres
  #   environment:
  #     - POSTGRES_DB=bitbonsai
