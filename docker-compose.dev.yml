version: '3.8'

services:
  bitbonsai-backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend
    container_name: bitbonsai-backend
    ports:
      - "3002:3000"
      - "9229:9229"  # Node.js debug port
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:/data/bitbonsai.db
      - PORT=3000
      - MEDIA_PATHS=/media/TV,/media/Movies,/media/Anime
      - LOG_LEVEL=debug
    volumes:
      - ./apps/backend:/app/apps/backend:cached
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./nx.json:/app/nx.json:ro
      - ./apps/backend/project.json:/app/apps/backend/project.json:ro
      - ./apps/backend/webpack.config.js:/app/apps/backend/webpack.config.js:ro
      - ./test-media:/media:ro
      - bitbonsai-data:/data
      - /app/node_modules
    command: sh -c "npx nx build backend --watch & sleep 5 && npx nodemon dist/apps/backend/main.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bitbonsai-network

  bitbonsai-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend
    container_name: bitbonsai-frontend
    ports:
      - "4201:4200"
    environment:
      - NODE_ENV=development
    volumes:
      - ./apps/frontend:/app/apps/frontend:cached
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./nx.json:/app/nx.json:ro
      - ./angular.json:/app/angular.json:ro
      - ./apps/frontend/project.json:/app/apps/frontend/project.json:ro
      - ./proxy.conf.json:/app/proxy.conf.json:ro
      - /app/node_modules
    command: npx nx serve frontend --host 0.0.0.0
    restart: unless-stopped
    depends_on:
      bitbonsai-backend:
        condition: service_healthy
    networks:
      - bitbonsai-network

  # Optional: PostgreSQL for commercial tier (uncomment to enable)
