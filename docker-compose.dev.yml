  #     - POSTGRES_PASSWORD=bitbonsai_secure_password
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U bitbonsai"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - bitbonsai-network

  # Optional: Redis for BullMQ commercial tier (uncomment to enable)
  # redis:
  #   image: redis:7-alpine
  #   container_name: bitbonsai-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
