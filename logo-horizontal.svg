<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Horizontal logo with text -->

  <!-- Icon circle -->
  <circle cx="60" cy="60" r="55" fill="#1a1a1a" stroke="#f9be03" stroke-width="2"/>

  <!-- Bonsai pot -->
  <path d="M 35 88 L 38 98 L 82 98 L 85 88 Z" fill="#8B4513" stroke="#654321" stroke-width="1.5"/>
  <rect x="38" y="98" width="44" height="4" rx="2" fill="#654321"/>

  <!-- Trunk -->
  <path d="M 56 88 Q 55 75, 54 62 Q 53 50, 56 42"
        fill="none" stroke="#8B4513" stroke-width="6" stroke-linecap="round"/>

  <!-- Branches -->
  <path d="M 54 62 Q 42 60, 32 57"
        fill="none" stroke="#2d5016" stroke-width="4" stroke-linecap="round"/>
  <path d="M 56 50 Q 68 48, 78 46"
        fill="none" stroke="#2d5016" stroke-width="4" stroke-linecap="round"/>
  <path d="M 56 42 Q 60 32, 63 25"
        fill="none" stroke="#2d5016" stroke-width="3" stroke-linecap="round"/>

  <!-- Pixelated leaves -->
  <rect x="26" y="54" width="6" height="6" fill="#4CAF50" opacity="0.9"/>
  <rect x="32" y="54" width="6" height="6" fill="#66BB6A" opacity="0.9"/>
  <rect x="29" y="48" width="6" height="6" fill="#81C784" opacity="0.9"/>

  <rect x="74" y="43" width="6" height="6" fill="#4CAF50" opacity="0.9"/>
  <rect x="80" y="43" width="6" height="6" fill="#66BB6A" opacity="0.9"/>
  <rect x="77" y="37" width="6" height="6" fill="#81C784" opacity="0.9"/>

  <rect x="60" y="22" width="6" height="6" fill="#4CAF50" opacity="0.9"/>
  <rect x="66" y="22" width="6" height="6" fill="#66BB6A" opacity="0.9"/>
  <rect x="63" y="16" width="6" height="6" fill="#81C784" opacity="0.9"/>

  <!-- Text -->
  <text x="135" y="75" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#f9be03">
    BitBonsai
  </text>

  <!-- Tagline -->
  <text x="138" y="95" font-family="Arial, sans-serif" font-size="14" fill="#999">
    Media Optimization Platform
  </text>
</svg>
