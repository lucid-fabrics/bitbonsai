name: PR Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, macbook]
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npx nx run-many --target=lint --all || true
      - run: npx prettier --check "**/*.{ts,json,md,scss,html}" --ignore-path .prettierignore || true

  test-backend:
    name: Test Backend
    runs-on: [self-hosted, macbook]
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npx nx test backend --passWithNoTests

  test-frontend:
    name: Test Frontend
    runs-on: [self-hosted, macbook]
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --legacy-peer-deps
      - run: npx nx test frontend --passWithNoTests

  build-backend:
    name: Build Backend
    runs-on: [self-hosted, macbook]
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npx nx build backend --configuration=production

  build-frontend:
    name: Build Frontend
    runs-on: [self-hosted, macbook]
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --legacy-peer-deps
      - run: npx nx build frontend --configuration=production

  build-website:
    name: Build Website
    runs-on: [self-hosted, macbook]
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --legacy-peer-deps
      - run: npx nx build website --configuration=production
