version: '3.8'

services:
  bitbonsai-backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend
    container_name: bitbonsai-backend
    ports:
      - "3100:3000"     # Backend API (accessible from network) - using 3100 to avoid pikatask conflict
      - "9239:9229"     # Node.js debug port for remote debugging - using 9239 to avoid conflicts
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:/data/bitbonsai.db
      - PORT=3000
      - MEDIA_PATHS=/media/sonarr,/media/radarr,/media/whisparr,/unraid-media
      - LOG_LEVEL=debug
      - ALLOWED_ORIGINS=http://192.168.1.100:4210
      - JWT_SECRET=th0gKVNxk7RWAaB8jHkBQ+E5TYFlg2ChbbR/ntTI0i4=
      - ADMIN_PASSWORD=12rIYlY8VxiooyMkHtu-1XdDgCOY-s7C
    volumes:
      # Source code with HMR (synced from Mac)
      - ./apps/backend:/app/apps/backend:cached
      - ./libs:/app/libs:cached
      - ./prisma:/app/prisma:cached
      - ./scripts:/app/scripts:cached
      # Unraid Downloads directory - maps to your encoding pipeline
      - /mnt/user/Downloads:/media:cached
      # Unraid Media directory - for existing media library
      - /mnt/user/media:/unraid-media:cached
      # Database persistence
      - bitbonsai-data:/data
      # Preserve node_modules (don't mount from host)
      - /app/node_modules
    # Use startup script from Dockerfile that auto-regenerates Prisma
    # command: /app/scripts/backend-startup.sh  # Inherited from Dockerfile
    restart: unless-stopped
    networks:
      - bitbonsai-network

  bitbonsai-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend
    container_name: bitbonsai-frontend
    ports:
      - "4210:4200"     # Frontend (accessible from network) - using 4210 to avoid pikatask conflict
    environment:
      - NODE_ENV=development
    volumes:
      # Source code with HMR (synced from Mac)
      - ./apps/frontend:/app/apps/frontend:cached
      - ./libs:/app/libs:cached
      - ./proxy.docker.conf.json:/app/proxy.conf.json:ro
      - ./angular.json:/app/angular.json:ro
      # Preserve node_modules (don't mount from host)
      - /app/node_modules
    command: npx nx serve frontend --host 0.0.0.0 --poll 2000 --disable-host-check
    restart: unless-stopped
    networks:
      - bitbonsai-network
    depends_on:
      - bitbonsai-backend

volumes:
  bitbonsai-data:
    driver: local

networks:
  bitbonsai-network:
    driver: bridge
