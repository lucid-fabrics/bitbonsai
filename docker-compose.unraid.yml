version: '3.8'

services:
  # PostgreSQL Database (Centralized database for multi-node architecture)
  bitbonsai-postgres:
    image: postgres:16-alpine
    container_name: bitbonsai-postgres
    environment:
      - POSTGRES_DB=bitbonsai
      - POSTGRES_USER=bitbonsai
      - POSTGRES_PASSWORD=bitbonsai_db_password_2024
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - bitbonsai-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # Expose for child nodes to connect
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitbonsai"]
      interval: 10s
      timeout: 5s
      retries: 5

  bitbonsai-backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend
    container_name: bitbonsai-backend
    network_mode: host  # Required for mDNS auto-discovery
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://bitbonsai:bitbonsai_db_password_2024@192.168.1.100:5432/bitbonsai?schema=public
      - PORT=3100  # Backend API port (direct access with host networking)
      - MEDIA_PATHS=/media/Movies,/media/TV,/media/whisparr,/media/Anime,/media/Anime Movies
      - LOG_LEVEL=debug
      - ALLOWED_ORIGINS=http://192.168.1.100:4210
      - JWT_SECRET=th0gKVNxk7RWAaB8jHkBQ+E5TYFlg2ChbbR/ntTI0i4=
      - ADMIN_PASSWORD=12rIYlY8VxiooyMkHtu-1XdDgCOY-s7C
      - ENCRYPTION_KEY=VXwrVvc2qvR4OEvuHy7aGxcJzIgcPY53M0FOY4PaquI=
      # PERF: Use Unraid cache pool (SSD) for encoding temp files for faster I/O
      - ENCODING_TEMP_PATH=/cache
    volumes:
      # Source code with HMR (synced from Mac)
      - ./apps/backend:/app/apps/backend:cached
      - ./libs:/app/libs:cached
      - ./prisma:/app/prisma:cached
      - ./scripts:/app/scripts:cached
      # Workspace config files (required for NX to find projects)
      - ./nx.json:/app/nx.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./package.json:/app/package.json:ro
      # Unraid Media directory - main media library with movies, tv shows, etc.
      - /mnt/user/media:/media:cached
      # Unraid Downloads directory - for download monitoring (optional)
      - /mnt/user/Downloads:/downloads:cached
      # PERF: Unraid cache pool (SSD) for encoding temp files - much faster I/O
      - /mnt/cache/bitbonsai-temp:/cache:cached
      # MULTI-NODE: Shared preview storage (writable NFS share)
      - /mnt/user/bitbonsai-previews:/previews:cached
      # Database persistence
      - bitbonsai-data:/data
      # Shared storage mount point for NFS/SMB mounts
      - bitbonsai-shared:/mnt/shared
      # Docker socket for volume auto-detection
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Preserve node_modules (don't mount from host)
      - /app/node_modules
    # Capabilities required for mounting NFS/SMB shares
    cap_add:
      - SYS_ADMIN         # Required for mount operations
      - DAC_READ_SEARCH   # Allows reading all files regardless of permissions
    security_opt:
      - apparmor:unconfined  # Required for mount operations
    # Use startup script from Dockerfile that auto-regenerates Prisma
    # command: /app/scripts/backend-startup.sh  # Inherited from Dockerfile
    restart: unless-stopped
    # Note: network_mode: host is incompatible with networks: directive

  bitbonsai-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend
    container_name: bitbonsai-frontend
    ports:
      - "4210:4200"     # Frontend (accessible from network) - using 4210 to avoid pikatask conflict
    environment:
      - NODE_ENV=development
    volumes:
      # Source code with HMR (synced from Mac)
      - ./apps/frontend:/app/apps/frontend:cached
      - ./libs:/app/libs:cached
      # Workspace config files (required for NX to find projects)
      - ./proxy.docker.conf.json:/app/proxy.conf.json:ro
      - ./angular.json:/app/angular.json:ro
      - ./nx.json:/app/nx.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./package.json:/app/package.json:ro
      # Preserve node_modules (don't mount from host)
      - /app/node_modules
    command: npx nx serve frontend --host 0.0.0.0 --poll 2000 --disable-host-check
    restart: unless-stopped
    networks:
      - bitbonsai-network
    depends_on:
      - bitbonsai-backend

volumes:
  bitbonsai-postgres-data:
    driver: local
  bitbonsai-data:
    driver: local
  bitbonsai-shared:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/shared

networks:
  bitbonsai-network:
    driver: bridge
